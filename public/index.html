<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a4a6e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Insurance Daily" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Asia-Pacific insurance news briefing — 5 headlines per region, refreshed daily." />
  <title>Asia Insurance Daily</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --text: #1a1a18;
      --muted: #6b6860;
      --line: #ddd8cf;
      --accent: #1a4a6e;
      --header-h: 0px;
      --nav-h: 0px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tag-leadership: #5c3d6e;
      --tag-strategy: #1e4d3a;
      --tag-product: #1a4a6e;
      --tag-regulatory: #8b3a2a;
      --tag-earnings: #6b5a1a;
      --tag-press: #4a4a48;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: var(--safe-bottom);
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      padding-top: calc(1rem + var(--safe-top));
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: calc(-1 * var(--safe-top)) -1rem 0;
      padding: calc(0.75rem + var(--safe-top)) 1rem 0.75rem;
      background: rgba(244, 242, 238, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .eyebrow {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    h1 {
      font-size: clamp(1.25rem, 4vw, 1.65rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .region-badge {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #e3ebf2;
      color: var(--accent);
      padding: 0.18rem 0.45rem;
      margin-left: 0.35rem;
      vertical-align: middle;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.35;
    }

    .actions { flex-shrink: 0; }

    button {
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      min-height: 44px;
      min-width: 44px;
      padding: 0.5rem 0.9rem;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
      touch-action: manipulation;
    }

    button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: wait; }

    .status { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; }
    .status.success { color: var(--tag-strategy); }
    .status.error { color: var(--tag-regulatory); }

    .summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem 1rem;
      padding: 0.75rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      margin: 1rem 0 0.75rem;
      font-size: 0.8rem;
    }

    .summary-count { font-weight: 600; width: 100%; }

    .summary-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.85rem;
      color: var(--muted);
    }

    .summary-tags span {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .legend-toggle {
      display: none;
      width: 100%;
      margin: 0.5rem 0 0.75rem;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 0.82rem;
      min-height: 36px;
      padding: 0.25rem 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.85rem;
      margin-bottom: 1rem;
      font-size: 0.76rem;
      color: var(--muted);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .region-nav {
      display: none;
      position: sticky;
      top: calc(var(--header-h, 72px) - 1px);
      z-index: 15;
      margin: 0 -1rem 0.75rem;
      padding: 0.5rem 1rem;
      background: rgba(244, 242, 238, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .region-nav::-webkit-scrollbar { display: none; }

    .region-nav-inner {
      display: flex;
      gap: 0.45rem;
      min-width: min-content;
    }

    .region-tab {
      flex: 0 0 auto;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      min-height: 40px;
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      white-space: nowrap;
      touch-action: manipulation;
    }

    .region-tab.active {
      color: var(--surface);
      border-color: transparent;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .grid.mobile-tabs .card {
      display: none;
    }

    .grid.mobile-tabs .card.active {
      display: flex;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      min-height: 180px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1rem 0.75rem;
      border-bottom: 1px solid var(--line);
    }

    .sector-bar {
      width: 3px;
      height: 1.1rem;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .card-count {
      margin-left: auto;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.62rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.3;
      max-width: 42%;
    }

    .bullets {
      list-style: none;
      flex: 1;
      padding: 0.25rem 1rem 0.85rem;
    }

    .bullets li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5rem 0.65rem;
      align-items: start;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f0ece6;
    }

    .bullets li:last-child { border-bottom: none; }

    .tag {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 0.2rem;
    }

    .tag-leadership { background: #ede6f0; color: var(--tag-leadership); }
    .tag-strategy { background: #e3ede8; color: var(--tag-strategy); }
    .tag-product { background: #e3ebf2; color: var(--tag-product); }
    .tag-regulatory { background: #f2e8e5; color: var(--tag-regulatory); }
    .tag-earnings { background: #f0ece0; color: var(--tag-earnings); }
    .tag-press { background: #ececea; color: var(--tag-press); }

    .bullet-body a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.4;
      display: inline-block;
      padding: 0.1rem 0;
    }

    .bullet-body a:hover { color: var(--accent); text-decoration: underline; }

    .source {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 0.25rem;
      line-height: 1.35;
    }

    .empty {
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
      padding: 0.65rem 0;
      grid-column: 1 / -1;
    }

    .via-rss {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.55rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--tag-strategy);
      margin-left: 0.25rem;
      vertical-align: middle;
    }

    footer {
      margin-top: 1.25rem;
      font-size: 0.74rem;
      color: var(--muted);
      line-height: 1.45;
      padding-bottom: var(--safe-bottom);
    }

    .loading, .error {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }

    .error { color: var(--tag-regulatory); }

    @media (max-width: 720px) {
      .shell { padding-left: 0.85rem; padding-right: 0.85rem; }
      .top-bar { margin-left: -0.85rem; margin-right: -0.85rem; padding-left: 0.85rem; padding-right: 0.85rem; }
      .region-nav { display: block; margin-left: -0.85rem; margin-right: -0.85rem; padding-left: 0.85rem; padding-right: 0.85rem; }
      .legend-toggle { display: block; }
      .legend { display: none; margin-bottom: 0.75rem; }
      .legend.open { display: flex; }
      .grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .card-count { max-width: 46%; }
      .region-badge { display: block; margin: 0.35rem 0 0; width: fit-content; }
      h1 { display: flex; flex-direction: column; align-items: flex-start; gap: 0.15rem; }
      .summary-count { font-size: 0.78rem; }
    }

    @media (min-width: 721px) {
      .shell { padding: 1.5rem 1.25rem 3rem; padding-top: calc(1.5rem + var(--safe-top)); }
      .top-bar {
        position: static;
        margin: 0;
        padding: 0 0 1.25rem;
        background: transparent;
        backdrop-filter: none;
        border-bottom: 1px solid var(--line);
      }
      header { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top-bar" id="top-bar">
      <header>
        <div>
          <div class="eyebrow">Daily briefing · Regional view</div>
          <h1><span id="dashboard-title">Asia Insurance Daily</span> <span class="region-badge">Asia-Pacific</span></h1>
          <p class="meta" id="meta">Loading…</p>
          <p class="status" id="status"></p>
        </div>
        <div class="actions">
          <button type="button" id="refresh-btn" aria-label="Refresh headlines">Refresh</button>
        </div>
      </header>
    </div>

    <div class="summary" id="summary" hidden></div>

    <button type="button" class="legend-toggle" id="legend-toggle" aria-expanded="false" aria-controls="legend">
      Show tag legend
    </button>
    <div class="legend" id="legend">
      <span><i class="dot" style="background:var(--tag-regulatory)"></i> Regulatory</span>
      <span><i class="dot" style="background:var(--tag-leadership)"></i> Leadership</span>
      <span><i class="dot" style="background:var(--tag-strategy)"></i> Strategy</span>
      <span><i class="dot" style="background:var(--tag-product)"></i> Product</span>
      <span><i class="dot" style="background:var(--tag-earnings)"></i> Earnings</span>
      <span><i class="dot" style="background:var(--tag-press)"></i> Press</span>
    </div>

    <nav class="region-nav" id="region-nav" aria-label="Regions" hidden>
      <div class="region-nav-inner" id="region-nav-inner"></div>
    </nav>

    <main id="main">
      <p class="loading">Fetching latest headlines…</p>
    </main>

    <footer id="footer">
      Curated Asia-Pacific insurance sources. Auto-refresh daily at 7:00 AM SGT.
    </footer>
  </div>

  <script type="module">
    import { initDashboard } from "./app.js";
    initDashboard({
      title: "Asia Insurance Daily",
      timezone: "Asia/Singapore",
    });
  </script>
</body>
</html>
